name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example app-v0.1.2. Defaults to app-v<package version>."
        required: false
        type: string
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: windows-latest
    timeout-minutes: 15

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      title: ${{ steps.metadata.outputs.title }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: metadata
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $tagInput = '${{ inputs.tag }}'
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } elseif ($tagInput) {
            $tag = $tagInput
          } else {
            $tag = "app-v$version"
          }

          if ($tag -ne "app-v$version") {
            throw "Release tag '$tag' does not match package version '$version'. Expected app-v$version."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "title=WhatToDo v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify release inputs
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is required."
          }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
            throw "TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is required."
          }
          pnpm release:check

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            platform: windows-x86_64
            build_args: --bundles nsis
            release_paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.sig
            updater_glob: src-tauri/target/release/bundle/nsis/*-setup.exe
          - label: macOS x64
            os: macos-15-intel
            platform: darwin-x86_64
            build_args: ""
            release_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.tar.gz
              src-tauri/target/release/bundle/macos/*.sig
            updater_glob: src-tauri/target/release/bundle/macos/*.app.tar.gz
          - label: macOS ARM64
            os: macos-latest
            platform: darwin-aarch64
            build_args: ""
            release_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.tar.gz
              src-tauri/target/release/bundle/macos/*.sig
            updater_glob: src-tauri/target/release/bundle/macos/*.app.tar.gz
          - label: Linux x64
            os: ubuntu-22.04
            platform: linux-x86_64
            build_args: --bundles appimage,deb
            release_paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.sig
              src-tauri/target/release/bundle/deb/*.deb
            updater_glob: src-tauri/target/release/bundle/appimage/*.AppImage

    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      CARGO_TERM_COLOR: always
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test and build
        run: |
          pnpm test
          pnpm build
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build signed installer
        run: pnpm tauri build ${{ matrix.build_args }}

      - name: Generate platform updater metadata
        shell: pwsh
        run: |
          $matches = @(Get-ChildItem -Path "${{ matrix.updater_glob }}" -File -ErrorAction SilentlyContinue)

          if (-not $matches) {
            Write-Host "Available release bundle files:"
            Get-ChildItem src-tauri/target/release/bundle -Recurse -File | ForEach-Object { Write-Host $_.FullName }
            throw "Updater artifact matching '${{ matrix.updater_glob }}' was not found."
          }

          $updater = $matches | Select-Object -First 1
          $signaturePath = "$($updater.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Updater signature was not found for $($updater.Name). Expected $signaturePath."
          }
          $signatureFile = Get-Item $signaturePath

          $signature = (Get-Content -Raw $signatureFile.FullName).Trim()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/$($updater.Name)"

          $metadata = [ordered]@{
            platform = "${{ matrix.platform }}"
            url = $downloadUrl
            signature = $signature
          }

          $metadataPath = "platform-${{ matrix.platform }}.json"
          [System.IO.File]::WriteAllText(
            (Join-Path (Get-Location) $metadataPath),
            ($metadata | ConvertTo-Json -Depth 4),
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            ${{ matrix.release_paths }}
            platform-${{ matrix.platform }}.json

  publish:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_TITLE: ${{ needs.prepare.outputs.title }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: false

      - name: Generate release notes and latest.json
        shell: pwsh
        run: |
          $changelog = Get-Content -Raw CHANGELOG.md
          $versionPattern = [regex]::Escape($env:APP_VERSION)
          $match = [regex]::Match($changelog, "(?ms)^##\s+\[?$versionPattern\]?\s*\r?\n(?<body>.*?)(?=^##\s+|\z)")
          if ($match.Success) {
            $notes = $match.Groups["body"].Value.Trim()
          } else {
            $notes = "See CHANGELOG.md for release notes."
          }

          [System.IO.File]::WriteAllText(
            (Join-Path (Get-Location) "release-notes.md"),
            "## $env:APP_VERSION`n`n$notes`n",
            [System.Text.UTF8Encoding]::new($false)
          )

          $platforms = [ordered]@{}
          Get-ChildItem release-artifacts -Recurse -Filter "platform-*.json" | ForEach-Object {
            $metadata = Get-Content -Raw $_.FullName | ConvertFrom-Json
            $platforms[$metadata.platform] = [ordered]@{
              signature = $metadata.signature
              url = $metadata.url
            }
          }

          foreach ($required in @("windows-x86_64", "darwin-x86_64", "darwin-aarch64", "linux-x86_64")) {
            if (-not $platforms.Contains($required)) {
              throw "latest.json is missing $required metadata."
            }
          }

          $latest = [ordered]@{
            version = $env:APP_VERSION
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = $platforms
          }

          [System.IO.File]::WriteAllText(
            (Join-Path (Get-Location) "release-artifacts/latest.json"),
            ($latest | ConvertTo-Json -Depth 8),
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          $assetPaths = Get-ChildItem release-artifacts -Recurse -File |
            Where-Object { $_.Name -notlike "platform-*.json" } |
            ForEach-Object { $_.FullName }

          gh release view $env:RELEASE_TAG --repo ${{ github.repository }} *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:RELEASE_TAG `
              --repo ${{ github.repository }} `
              --title "$env:RELEASE_TITLE" `
              --notes-file release-notes.md `
              --latest
            gh release upload $env:RELEASE_TAG $assetPaths `
              --repo ${{ github.repository }} `
              --clobber
          } else {
            gh release create $env:RELEASE_TAG $assetPaths `
              --repo ${{ github.repository }} `
              --target ${{ github.sha }} `
              --title "$env:RELEASE_TITLE" `
              --notes-file release-notes.md `
              --latest
          }

      - name: Verify updater endpoint
        shell: pwsh
        run: |
          $metadata = Invoke-RestMethod "https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
          if ($metadata.version -ne $env:APP_VERSION) {
            throw "latest.json version '$($metadata.version)' does not match '$env:APP_VERSION'."
          }
          foreach ($required in @("windows-x86_64", "darwin-x86_64", "darwin-aarch64", "linux-x86_64")) {
            if (-not $metadata.platforms.$required.signature) {
              throw "latest.json is missing the $required updater signature."
            }
          }
